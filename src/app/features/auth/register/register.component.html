<main class="w_full d_flex_cc_gl">
  <form (ngSubmit)="onSubmit()" id="sign_up_form" class="std_form d_flex_cs_gl f_d_c" novalidate>
    <h1 class="font_prime_color d_flex_cs_gl w_full">Sign up</h1>

    <div [attr.error]="emailError ? 'true' : 'false'" id="email_group" class="form_group_w_icon_wo_label w_full">
      <img src="/assets/icons/mail.png" alt="Icon">
      <input (blur)="validateRegistrationEmail(emailInput.value)" #emailInput type="text" id="email" name="email"
             required autocomplete="email">
      <label for="email">Email</label>
      <p class="error_label">Please enter a valid email address.</p>
    </div>

    <div [attr.error]="passwordError ? 'true' : 'false'" id="password_group" class="form_group_w_icon_wo_label w_full">
      <img src="/assets/icons/password.png" alt="Icon">
      <input (blur)="validatePW(passwordInput.value)" #passwordInput type="password" id="password" name="password"
             required autocomplete="new-password">
      <label for="password">Password</label>
      <img (click)="togglePassword(passwordInput)" class="password_eye" src="/assets/icons/visibility.svg" alt="">
      <p class="error_label">Password must be at least 8 characters long.</p>
    </div>

    <div [attr.error]="confirmedPasswordError ? 'true' : 'false'" id="confirmed_password_group"
         class="form_group_w_icon_wo_label w_full">
      <img src="/assets/icons/password.png" alt="Icon">
      <input (blur)="validateConfirmPW(confirmedInput.value)" #confirmedInput type="password"
             id="confirmed_password" name="confirmed_password" required autocomplete="new-password">
      <label for="confirmed_password">Confirm password</label>
      <img (click)="togglePassword(confirmedInput)" class="password_eye" src="/assets/icons/visibility.svg" alt="">
      <p class="error_label">Passwords do not match.</p>
    </div>

    <div [attr.error]="privacyError ? 'true' : 'false'" id="privacy_policy_group"
         class="form_group_checkbox w_full" style="margin-top: 16px;">
      <label class="custom_checkbox" for="privacy_policy">
        <input #privacyCheckbox type="checkbox" id="privacy_policy" name="privacy_policy">
        <span class="checkbox_icon"></span>
        <span>Please accept the
          <a routerLink="/privacy" class="link" (click)="$event.stopPropagation()">Privacy Policy</a>
        </span>
      </label>
      <p class="error_label">must accept the privacy policy to continue.</p>
    </div>

    <div class="d_flex_cc_gl f_d_r_resp_c w_full">
      <button type="submit" class="std_btn btn_prime pad_s d_flex_cc_gs">Get started</button>
    </div>
  </form>
</main>
